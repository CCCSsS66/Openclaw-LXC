name: Build OpenClaw LXC Debian 12

on:
  workflow_dispatch:
    inputs:
      version:
        description: "模板版本号，填写 auto 自动生成"
        required: true
        default: "auto"
        type: string

permissions:
  contents: write

concurrency:
  group: openclaw-lxc-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  build:
    name: Build OpenClaw Debian 12 LXC
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    env:
      INPUT_VERSION: ${{ inputs.version }}
      GH_TOKEN: ${{ github.token }}
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        shell: bash
        run: |
          set -euxo pipefail

          sudo apt-get update

          sudo apt-get install -y \
            debootstrap \
            ca-certificates \
            curl \
            wget \
            gnupg \
            xz-utils \
            gzip \
            tar \
            jq \
            file \
            openssl \
            coreutils \
            util-linux \
            mount \
            gh

          gh --version

      - name: Check scripts
        shell: bash
        run: |
          set -euxo pipefail

          test -f scripts/build-openclaw-lxc.sh
          test -f scripts/install-openclaw.sh

          bash -n scripts/build-openclaw-lxc.sh
          bash -n scripts/install-openclaw.sh

          chmod +x \
            scripts/build-openclaw-lxc.sh \
            scripts/install-openclaw.sh

      - name: Build and publish template
        shell: bash
        run: |
          set -euo pipefail

          chmod +x \
            scripts/build-openclaw-lxc.sh \
            scripts/install-openclaw.sh

          ./scripts/build-openclaw-lxc.sh
