          #!/usr/bin/env bash
          set -Eeuo pipefail
          umask 077

          CONFIG="/root/.openclaw/openclaw.json"
          BACKUP="$CONFIG.bak.$(date -u +'%Y%m%d-%H%M%S')"

          if [ -f "$CONFIG" ]; then
            cp -a "$CONFIG" "$BACKUP"
            chmod 600 "$BACKUP"
          fi

          systemctl stop openclaw-gateway 2>/dev/null || true

          if ! /usr/local/sbin/openclaw-ensure-config ||
             ! /usr/local/sbin/openclaw-assert-max-permissions; then
            echo "错误：最高权限修复失败"

            if [ -f "$BACKUP" ]; then
              cp -a "$BACKUP" "$CONFIG"
              chmod 600 "$CONFIG"
              systemctl restart openclaw-gateway 2>/dev/null || true
            fi

            exit 1
          fi

          systemctl daemon-reload
          systemctl reset-failed openclaw-gateway 2>/dev/null || true
          systemctl restart openclaw-gateway

          for attempt in $(seq 1 30); do
            if systemctl is-active --quiet openclaw-gateway; then
              echo "OpenClaw Gateway 已正常启动"

              /usr/local/bin/openclaw-info || true
              exit 0
            fi

