          - 删除 tools.deny
          - Control UI 允许不安全认证
          - Device Auth 关闭

          OpenClaw 可以在容器内部执行任意 root 操作。

          ## 网络

          本模板不会主动关闭、刷新或修改 IPv6。

          网络协议和地址由 Proxmox VE、宿主机、容器网络配置和
          Linux 内核默认设置决定。

          ## 配置 API

          进入容器后执行：

          \`\`\`bash
          openclaw-api-setup
          \`\`\`

          ## 常用命令

          \`\`\`bash
          openclaw-info
          openclaw-status
          openclaw-logs
          openclaw-restart
          openclaw-plugins
          openclaw-update
          openclaw-repair-max-permissions
          \`\`\`
          RELEASE_README

          ls -lh \
            "$IMAGE_NAME" \
            "$IMAGE_NAME.sha256" \
            README.md

          echo "=================================================="
          echo "[8/8] 上传 GitHub Release"
          echo "=================================================="

          TAG="openclaw-lxc-debian12-${VERSION}-openclaw-${RESOLVED_OPENCLAW_VERSION}"

          TITLE="OpenClaw ${RESOLVED_OPENCLAW_VERSION} LXC Debian 12 Dangerous Full Tools ${VERSION}"

          echo "Repository: $GITHUB_REPOSITORY"
          echo "Commit: $GITHUB_SHA"
          echo "Tag: $TAG"
          echo "Image: $IMAGE_NAME"

          gh auth status --hostname github.com

          if gh release view "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            >/dev/null 2>&1; then
            echo "错误：Release 已经存在，禁止覆盖：$TAG"
            echo "请使用新的 version 重新构建"
            exit 1
          fi

          gh release create "$TAG" \
            "$IMAGE_NAME" \
            "$IMAGE_NAME.sha256" \
            README.md \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$TITLE" \
            --notes-file README.md

          gh release view "$TAG" \
            --repo "$GITHUB_REPOSITORY"

          echo "=================================================="
          echo "校验 GitHub Release 下载文件"
          echo "=================================================="

          VERIFY_DIR="$(mktemp -d)"

          cleanup_verify() {
            rm -rf -- "$VERIFY_DIR"
          }

          trap cleanup_verify EXIT

          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$IMAGE_NAME" \
            --pattern "$IMAGE_NAME.sha256" \
            --dir "$VERIFY_DIR"

          cd "$VERIFY_DIR"

          ls -lh \
            "$IMAGE_NAME" \
            "$IMAGE_NAME.sha256"

          sha256sum -c "$IMAGE_NAME.sha256"
          gzip -t "$IMAGE_NAME"
          tar -tzf "$IMAGE_NAME" >/dev/null

          cd /
          rm -rf -- "$VERIFY_DIR"
          trap - EXIT

          echo "=================================================="
          echo "构建和 Release 校验完成"
          echo "=================================================="
          echo "Tag: $TAG"
          echo "Image: $IMAGE_NAME"
          echo "OpenClaw: $RESOLVED_OPENCLAW_VERSION"
          echo "=================================================="
          BUILD_SCRIPT

          chmod 755 build-openclaw-lxc.sh

          bash -n build-openclaw-lxc.sh

          ./build-openclaw-lxc.sh
