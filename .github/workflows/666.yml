name: Build OpenClaw LXC Debian-NB2

on:
  workflow_dispatch:
    inputs:
      version:
        description: "模板版本号"
        required: true
        default: "auto"
      openclaw_version:
        description: "OpenClaw 版本，例如 latest、1.2.3"
        required: true
        default: "latest"

permissions:
  contents: write

concurrency:
  group: openclaw-lxc-${{ github.ref }}-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    env:
      INPUT_VERSION: ${{ inputs.version }}
      INPUT_OPENCLAW_VERSION: ${{ inputs.openclaw_version }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Install build tools
        shell: bash
        run: |
          set -Eeuxo pipefail

          sudo apt-get update

          sudo apt-get install -y \
            debootstrap \
            ca-certificates \
            curl \
            wget \
            gnupg \
            xz-utils \
            gzip \
            tar \
            jq \
            file \
            openssl \
            coreutils \
            util-linux \
            findutils \
            gawk \
            shellcheck \
            gh

          gh --version
          debootstrap --version
          jq --version
          shellcheck --version

      - name: Build and publish OpenClaw LXC template
        shell: bash
        run: |
          cat > build-openclaw-lxc.sh <<'BUILD_SCRIPT'
          #!/usr/bin/env bash
          set -Eeuo pipefail

          export DEBIAN_FRONTEND=noninteractive

          VERSION="${INPUT_VERSION:-auto}"
          OPENCLAW_VERSION="${INPUT_OPENCLAW_VERSION:-latest}"

          if [ "$VERSION" = "auto" ]; then
            VERSION="$(date -u +'%Y.%m.%d-%H%M%S')"
          fi

          if ! printf '%s' "$VERSION" |
            grep -Eq '^[A-Za-z0-9._-]+$'; then
            echo "错误：version 只能包含字母、数字、点、下划线和横线"
            exit 1
          fi

          case "$OPENCLAW_VERSION" in
            latest|next|beta|alpha|canary)
              ;;
            *)
              if ! printf '%s' "$OPENCLAW_VERSION" |
                grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([+-][A-Za-z0-9._-]+)?$'; then
                echo "错误：OpenClaw 版本格式不受支持：$OPENCLAW_VERSION"
                echo "允许：latest、next、beta、alpha、canary 或明确的语义化版本号"
                exit 1
              fi
              ;;
          esac

          IMAGE_PREFIX="openclaw-lxc-debian12"

          WORK_DIR="$PWD/work"
          ROOTFS="$WORK_DIR/rootfs"
          TEST_EXTRACT_DIR="$WORK_DIR/test-extract"
          DIST_DIR="$PWD/dist"

          mkdir -p "$WORK_DIR" "$DIST_DIR"

          rootfs_mounts() {
            findmnt -rn -o TARGET |
              awk -v root="$ROOTFS" '
                $0 == root || index($0, root "/") == 1 {
                  print length($0) "\t" $0
                }
              ' |
              sort -rn |
              cut -f2-
          }

          cleanup_mounts() (
            set +e

            rootfs_mounts |
              while IFS= read -r mountpoint; do
                [ -n "$mountpoint" ] || continue
                echo "卸载挂载点：$mountpoint"
                sudo umount -lf -- "$mountpoint" 2>/dev/null || true
              done
          )

          assert_no_rootfs_mounts() {
            local remaining

            remaining="$(rootfs_mounts || true)"

            if [ -n "$remaining" ]; then
              echo "错误：rootfs 下仍然存在挂载点："
              printf '%s\n' "$remaining"
              return 1
            fi
          }

          cleanup_all() {
            cleanup_mounts || true
          }

          trap cleanup_all EXIT

          cleanup_mounts
          assert_no_rootfs_mounts

          echo "=================================================="
          echo "[1/8] 创建 Debian 12 rootfs"
          echo "=================================================="

          sudo rm -rf -- "$ROOTFS"
          sudo mkdir -p "$ROOTFS"

          sudo debootstrap \
            --arch=amd64 \
            --variant=minbase \
            bookworm \
            "$ROOTFS" \
            http://deb.debian.org/debian

          echo "=================================================="
          echo "[2/8] 挂载 chroot 环境"
          echo "=================================================="

          sudo mount -t proc proc "$ROOTFS/proc"

          sudo mount --rbind /sys "$ROOTFS/sys"
          sudo mount --make-rslave "$ROOTFS/sys"

          sudo mount --rbind /dev "$ROOTFS/dev"
          sudo mount --make-rslave "$ROOTFS/dev"

          sudo cp -L /etc/resolv.conf "$ROOTFS/etc/resolv.conf"

          echo "OpenClaw" |
            sudo tee "$ROOTFS/etc/hostname" >/dev/null

          sudo tee "$ROOTFS/etc/hosts" >/dev/null <<'HOSTS_FILE'
          127.0.0.1 localhost
          127.0.1.1 OpenClaw

          ::1 localhost ip6-localhost ip6-loopback
          ff02::1 ip6-allnodes
          ff02::2 ip6-allrouters
          HOSTS_FILE

          echo "=================================================="
          echo "[3/8] 写入 chroot 安装脚本"
          echo "=================================================="

          sudo tee "$ROOTFS/tmp/install-inside.sh" >/dev/null <<'INSIDE_SCRIPT'
          #!/usr/bin/env bash
          set -Eeuo pipefail

          export DEBIAN_FRONTEND=noninteractive
          umask 022

          OPENCLAW_VERSION="${OPENCLAW_VERSION:-latest}"

          OPENCLAW_USER="root"
          OPENCLAW_GROUP="root"
          OPENCLAW_HOME="/root"
          OPENCLAW_GATEWAY_PORT="18789"
          OPENCLAW_GATEWAY_BIND="lan"
          OPENCLAW_NET_IFACE="eth0"

          cleanup_install_environment() {
            rm -f /usr/sbin/policy-rc.d
          }

          trap cleanup_install_environment EXIT

          cat >/usr/sbin/policy-rc.d <<'POLICY_RC'
          #!/bin/sh
          exit 101
          POLICY_RC

          chmod 755 /usr/sbin/policy-rc.d

          echo "=================================================="
          echo "设置 Debian 12 官方源"
          echo "=================================================="

          rm -f /etc/apt/sources.list.d/debian.sources

          cat >/etc/apt/sources.list <<'APT_SOURCES'
          deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian bookworm-backports main contrib non-free non-free-firmware
          deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware
          APT_SOURCES

          apt-get update

          echo "=================================================="
          echo "安装系统环境"
          echo "=================================================="

          CORE_PACKAGES=(
            systemd
            systemd-sysv
            libpam-systemd
            dbus
            dbus-user-session
            openssh-server
            openssh-client
            sudo
            ifupdown
            iproute2
            iputils-ping
            net-tools
            procps
            psmisc
            lsof
            htop
            tmux
            screen
            nano
            vim
            less
            bash-completion
            ca-certificates
            curl
            wget
            git
            rsync
            unzip
            zip
            tar
            gzip
            bzip2
            xz-utils
            zstd
            jq
            file
            openssl
            gnupg
            gpg-agent
            dirmngr
            apt-transport-https
            locales
            tzdata
            cron
            logrotate
            acl
            attr
            tree
            ncdu
            dnsutils
            traceroute
            mtr-tiny
            tcpdump
            netcat-openbsd
            socat
            iptables
            nftables
            python3
            python3-full
            python3-venv
            python3-pip
            pipx
            build-essential
            make
            gcc
            g++
            pkg-config
            strace
            sqlite3
            libssl-dev
            libffi-dev
            libsqlite3-dev
            zlib1g-dev
          )

          apt-get install -y "${CORE_PACKAGES[@]}"

          OPTIONAL_PACKAGES=(
            iputils-tracepath
            sysstat
            iotop
            time
            command-not-found
            man-db
            manpages
            git-lfs
            yq
            software-properties-common
            lsb-release
            bind9-dnsutils
            nmap
            iperf3
            whois
            telnet
            ethtool
            cmake
            ninja-build
            autoconf
            automake
            libtool
            patch
            gettext
            gdb
            libbz2-dev
            libreadline-dev
            liblzma-dev
            libncurses-dev
            libgdbm-dev
            libnss3-dev
            uuid-dev
            ripgrep
            fd-find
            bat
            dos2unix
            moreutils
          )

          for package in "${OPTIONAL_PACKAGES[@]}"; do
            apt-get install -y "$package" || true
          done

          ln -sf /usr/bin/fdfind /usr/local/bin/fd 2>/dev/null || true
          ln -sf /usr/bin/batcat /usr/local/bin/bat 2>/dev/null || true

          echo "=================================================="
          echo "删除 IPv4 DHCP 和 NetworkManager"
          echo "=================================================="

          for package in \
            isc-dhcp-client \
            isc-dhcp-common \
            dhcpcd5 \
            dhcpcd-base \
            udhcpc \
            network-manager
          do
            apt-get purge -y "$package" 2>/dev/null || true
          done

          apt-get autoremove -y || true

          if command -v dhclient >/dev/null 2>&1; then
            echo "错误：dhclient 删除失败"
            exit 1
          fi

          echo "=================================================="
          echo "配置 locale 和 timezone"
          echo "=================================================="

          sed -i \
            's/^# *en_US.UTF-8 UTF-8/en_US.UTF-8 UTF-8/' \
            /etc/locale.gen || true

          sed -i \
            's/^# *zh_CN.UTF-8 UTF-8/zh_CN.UTF-8 UTF-8/' \
            /etc/locale.gen || true

          locale-gen

          cat >/etc/default/locale <<'LOCALE_CONF'
          LANG=en_US.UTF-8
          LC_ALL=en_US.UTF-8
          LOCALE_CONF

          ln -sf /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
          printf '%s\n' 'Asia/Shanghai' >/etc/timezone

          echo "=================================================="
          echo "配置网络框架"
          echo "=================================================="

          mkdir -p /etc/network/interfaces.d

          cat >/etc/network/interfaces <<'NETWORK_INTERFACES'
          auto lo
          iface lo inet loopback

          source /etc/network/interfaces.d/*
          NETWORK_INTERFACES

          cat >/etc/network/interfaces.d/00-openclaw-note <<'NETWORK_NOTE'
          # Configure container networking from the Proxmox VE panel.
          #
          # Example IPv4:
          # IPv4: Static
          # IPv4/CIDR: 192.168.1.50/24
          # Gateway: 192.168.1.1
          #
          # Other network protocols are controlled by Proxmox VE,
          # the host kernel and the container network configuration.
          NETWORK_NOTE

          systemctl unmask networking.service 2>/dev/null || true
          systemctl enable networking.service

          cat >/etc/systemd/system/openclaw-net-up.service <<'NETWORK_UP_SERVICE'
          [Unit]
          Description=Prepare OpenClaw LXC network interfaces
          DefaultDependencies=no
          After=local-fs.target
          Before=network-pre.target network.target networking.service network-online.target openclaw-firstboot.service

          [Service]
          Type=oneshot
          ExecStart=/bin/sh -ec 'ip link set lo up; ip link set eth0 up'
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target
          NETWORK_UP_SERVICE

          systemctl enable openclaw-net-up.service

          echo "=================================================="
          echo "配置 SSH"
          echo "=================================================="

          mkdir -p /run/sshd
          mkdir -p /etc/ssh/sshd_config.d

          cat >/etc/ssh/sshd_config.d/99-openclaw-lxc.conf <<'SSH_CONFIG'
          PasswordAuthentication yes
          PermitRootLogin yes
          KbdInteractiveAuthentication yes
          UsePAM yes
          SSH_CONFIG

          sed -ri \
            's/^#?PasswordAuthentication .*/PasswordAuthentication yes/' \
            /etc/ssh/sshd_config || true

          sed -ri \
            's/^#?PermitRootLogin .*/PermitRootLogin yes/' \
            /etc/ssh/sshd_config || true

          sed -ri \
            's/^#?KbdInteractiveAuthentication .*/KbdInteractiveAuthentication yes/' \
            /etc/ssh/sshd_config || true

          sed -ri \
            's/^#?UsePAM .*/UsePAM yes/' \
            /etc/ssh/sshd_config || true

          cat >/etc/systemd/system/regenerate-ssh-host-keys.service <<'SSH_KEY_SERVICE'
          [Unit]
          Description=Regenerate SSH host keys when missing
          After=local-fs.target
          Before=ssh.service

          [Service]
          Type=oneshot
          ExecStart=/bin/sh -ec 'if ! ls /etc/ssh/ssh_host_*_key >/dev/null 2>&1; then ssh-keygen -A; fi'
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target
          SSH_KEY_SERVICE

          systemctl enable regenerate-ssh-host-keys.service
          systemctl enable ssh.service
          systemctl enable cron.service

          echo "=================================================="
          echo "安装 Node.js 24"
          echo "=================================================="

          curl -fsSL https://deb.nodesource.com/setup_24.x |
            bash -

          apt-get install -y nodejs

          node --version
          npm --version

          npm config set fund false
          npm config set audit false
          npm config set update-notifier false

          echo "=================================================="
          echo "解析并安装固定 OpenClaw 版本"
          echo "=================================================="

          resolve_npm_version() {
            local specification="$1"
            local resolved

            resolved="$(
              npm view "$specification" version --json |
                jq -er '
                  if type == "array" then
                    if length > 0 then .[-1] else empty end
                  elif type == "string" then
                    .
                  else
                    empty
                  end
                '
            )"

            if ! printf '%s' "$resolved" |
              grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([+-][A-Za-z0-9._-]+)?$'; then
              echo "错误：无法解析 npm 版本：$specification -> $resolved" >&2
              return 1
            fi

            printf '%s\n' "$resolved"
          }

          RESOLVED_OPENCLAW_VERSION="$(
            resolve_npm_version "openclaw@${OPENCLAW_VERSION}"
          )"

          echo "OpenClaw 请求版本：$OPENCLAW_VERSION"
          echo "OpenClaw 实际版本：$RESOLVED_OPENCLAW_VERSION"

          npm install -g "openclaw@${RESOLVED_OPENCLAW_VERSION}"

          printf '%s\n' \
            "$RESOLVED_OPENCLAW_VERSION" \
            >/etc/openclaw-version

          chmod 644 /etc/openclaw-version

          command -v openclaw
          openclaw --version

          echo "=================================================="
          echo "固定 MCP 软件包版本"
          echo "=================================================="

          CONTEXT7_MCP_VERSION="$(
            resolve_npm_version '@upstash/context7-mcp@latest'
          )"

          FILESYSTEM_MCP_VERSION="$(
            resolve_npm_version \
              '@modelcontextprotocol/server-filesystem@latest'
          )"

          MEMORY_MCP_VERSION="$(
            resolve_npm_version \
              '@modelcontextprotocol/server-memory@latest'
          )"

          cat >/etc/openclaw-mcp-versions.env <<MCP_VERSIONS
          CONTEXT7_MCP_VERSION=$CONTEXT7_MCP_VERSION
          FILESYSTEM_MCP_VERSION=$FILESYSTEM_MCP_VERSION
          MEMORY_MCP_VERSION=$MEMORY_MCP_VERSION
          MCP_VERSIONS

          chmod 644 /etc/openclaw-mcp-versions.env

          npm cache add \
            "@upstash/context7-mcp@${CONTEXT7_MCP_VERSION}"

          npm cache add \
            "@modelcontextprotocol/server-filesystem@${FILESYSTEM_MCP_VERSION}"

          npm cache add \
            "@modelcontextprotocol/server-memory@${MEMORY_MCP_VERSION}"

          echo "=================================================="
          echo "切换中国 apt 和 npm 软件源"
          echo "=================================================="

          rm -f /etc/apt/sources.list.d/debian.sources

          cat >/etc/apt/sources.list <<'CHINA_APT_SOURCES'
          deb https://mirrors.tuna.tsinghua.edu.cn/debian bookworm main contrib non-free non-free-firmware
          deb https://mirrors.tuna.tsinghua.edu.cn/debian bookworm-updates main contrib non-free non-free-firmware
          deb https://mirrors.tuna.tsinghua.edu.cn/debian bookworm-backports main contrib non-free non-free-firmware
          deb https://mirrors.tuna.tsinghua.edu.cn/debian-security bookworm-security main contrib non-free non-free-firmware
          CHINA_APT_SOURCES

          if ! apt-get update; then
            cat >/etc/apt/sources.list <<'USTC_APT_SOURCES'
          deb https://mirrors.ustc.edu.cn/debian bookworm main contrib non-free non-free-firmware
          deb https://mirrors.ustc.edu.cn/debian bookworm-updates main contrib non-free non-free-firmware
          deb https://mirrors.ustc.edu.cn/debian bookworm-backports main contrib non-free non-free-firmware
          deb https://mirrors.ustc.edu.cn/debian-security bookworm-security main contrib non-free non-free-firmware
          USTC_APT_SOURCES

            apt-get update
          fi

          if ! find /etc/apt/sources.list.d \
            -maxdepth 1 \
            -type f \
            \( -name 'nodesource*.list' \
               -o -name 'nodesource*.sources' \
               -o -name '*node*.list' \
               -o -name '*node*.sources' \) |
            grep -q .; then
            echo "错误：NodeSource 软件源不存在"
            exit 1
          fi

          npm config set registry https://registry.npmmirror.com
          npm config set fund false
          npm config set audit false
          npm config set update-notifier false

          echo "=================================================="
          echo "准备 OpenClaw 目录"
          echo "=================================================="

          mkdir -p /root/.openclaw/workspace
          mkdir -p /root/.openclaw/agents/main/sessions
          mkdir -p /root/.openclaw/agents/main/agent

          chown -R root:root /root/.openclaw
          chmod 700 /root/.openclaw

          cat >/etc/openclaw-lxc.env <<'OPENCLAW_ENV'
          OPENCLAW_LXC=1
          OPENCLAW_DANGEROUS_FULL_TOOLS=1
          OPENCLAW_USER=root
          OPENCLAW_GROUP=root
          OPENCLAW_HOME=/root
          OPENCLAW_NET_IFACE=eth0
          OPENCLAW_GATEWAY_PORT=18789
          OPENCLAW_GATEWAY_BIND=lan
          OPENCLAW_HIDE_BANNER=1
          OPENCLAW_ENV

          chmod 644 /etc/openclaw-lxc.env

          echo "=================================================="
          echo "写入 OpenClaw 最高权限配置脚本"
          echo "=================================================="

          cat >/usr/local/sbin/openclaw-ensure-config <<'ENSURE_CONFIG'
          #!/usr/bin/env bash
          set -Eeuo pipefail
          umask 077

          [ -f /etc/openclaw-lxc.env ] &&
            . /etc/openclaw-lxc.env

          [ -f /etc/openclaw-mcp-versions.env ] &&
            . /etc/openclaw-mcp-versions.env

          OPENCLAW_USER="${OPENCLAW_USER:-root}"
          OPENCLAW_GROUP="${OPENCLAW_GROUP:-root}"
          OPENCLAW_HOME="${OPENCLAW_HOME:-/root}"
          OPENCLAW_GATEWAY_PORT="${OPENCLAW_GATEWAY_PORT:-18789}"
          OPENCLAW_GATEWAY_BIND="${OPENCLAW_GATEWAY_BIND:-lan}"

          CONTEXT7_MCP_VERSION="${CONTEXT7_MCP_VERSION:?}"
          FILESYSTEM_MCP_VERSION="${FILESYSTEM_MCP_VERSION:?}"
          MEMORY_MCP_VERSION="${MEMORY_MCP_VERSION:?}"

          CONFIG_FILE="$OPENCLAW_HOME/.openclaw/openclaw.json"

          case "$OPENCLAW_GATEWAY_BIND" in
            auto|lan|loopback|custom|tailnet)
              ;;
            *)
              OPENCLAW_GATEWAY_BIND="lan"
              ;;
          esac

          if ! [[ "$OPENCLAW_GATEWAY_PORT" =~ ^[0-9]+$ ]] ||
             [ "$OPENCLAW_GATEWAY_PORT" -lt 1 ] ||
             [ "$OPENCLAW_GATEWAY_PORT" -gt 65535 ]; then
            echo "错误：无效的 Gateway 端口：$OPENCLAW_GATEWAY_PORT"
            exit 1
          fi

          mkdir -p "$OPENCLAW_HOME/.openclaw/workspace"
          mkdir -p "$OPENCLAW_HOME/.openclaw/agents/main/sessions"
          mkdir -p "$OPENCLAW_HOME/.openclaw/agents/main/agent"

          if [ ! -s "$CONFIG_FILE" ] ||
             ! jq -e \
               'type == "object"' \
               "$CONFIG_FILE" >/dev/null 2>&1; then
            printf '{}\n' >"$CONFIG_FILE"
          fi

          CURRENT_TOKEN="$(
            jq -r '
              if type == "object"
                 and ((.gateway? | type) == "object")
                 and ((.gateway.auth? | type) == "object")
                 and ((.gateway.auth.token? | type) == "string")
              then
                .gateway.auth.token
              else
                ""
              end
            ' "$CONFIG_FILE"
          )"

          case "$CURRENT_TOKEN" in
            ""|'${OPENCLAW_GATEWAY_TOKEN}')
              CURRENT_TOKEN="$(openssl rand -hex 32)"
              ;;
          esac

          ELEVATED_ALLOW_FROM='{
            "*": ["*"],
            "webchat": ["*"],
            "api": ["*"],
            "cli": ["*"],
            "dashboard": ["*"],
            "gateway": ["*"],
            "local": ["*"],
            "mcp": ["*"],
            "agent": ["*"],
            "agents": ["*"],
            "tool": ["*"],
            "tools": ["*"],
            "exec": ["*"],
            "direct": ["*"],
            "server": ["*"],
            "whatsapp": ["*"],
            "telegram": ["*"],
            "discord": ["*"],
            "slack": ["*"],
            "signal": ["*"],
            "imessage": ["*"],
            "matrix": ["*"],
            "msteams": ["*"],
            "googlechat": ["*"],
            "mattermost": ["*"],
            "line": ["*"]
          }'

          TMP_FILE="$(mktemp)"

          cleanup() {
            rm -f -- "$TMP_FILE"
          }

          trap cleanup EXIT

          jq \
            --arg bind "$OPENCLAW_GATEWAY_BIND" \
            --arg token "$CURRENT_TOKEN" \
            --argjson port "$OPENCLAW_GATEWAY_PORT" \
            --argjson elevatedAllowFrom "$ELEVATED_ALLOW_FROM" \
            --arg context7Version "$CONTEXT7_MCP_VERSION" \
            --arg filesystemVersion "$FILESYSTEM_MCP_VERSION" \
            --arg memoryVersion "$MEMORY_MCP_VERSION" \
            '
            def object_or_empty:
              if type == "object" then . else {} end;

            . = (
              if type == "object" then
                .
              else
                {}
              end
            ) |

            .gateway = (
              (.gateway // {}) |
              object_or_empty
            ) |

            .gateway.mode = "local" |
            .gateway.port = $port |
            .gateway.bind = $bind |

            .gateway.auth = (
              (.gateway.auth // {}) |
              object_or_empty
            ) |

            .gateway.auth.mode = "token" |
            .gateway.auth.token = $token |

            .gateway.auth.rateLimit = (
              (.gateway.auth.rateLimit // {}) |
              object_or_empty
            ) |

            .gateway.auth.rateLimit.maxAttempts = 20 |
            .gateway.auth.rateLimit.windowMs = 60000 |
            .gateway.auth.rateLimit.lockoutMs = 300000 |
            .gateway.auth.rateLimit.exemptLoopback = true |

            .gateway.controlUi = (
              (.gateway.controlUi // {}) |
              object_or_empty
            ) |

            .gateway.controlUi.enabled = true |
            .gateway.controlUi.allowInsecureAuth = true |
            .gateway.controlUi.dangerouslyDisableDeviceAuth = true |

            .gateway.reload = (
              (.gateway.reload // {}) |
              object_or_empty
            ) |

            .gateway.reload.mode = "hybrid" |

            .cli = (
              (.cli // {}) |
              object_or_empty
            ) |

            .cli.banner = (
              (.cli.banner // {}) |
              object_or_empty
            ) |

            .cli.banner.taglineMode = "off" |

            .tools = (
              (.tools // {}) |
              object_or_empty
            ) |

            .tools.profile = "full" |

            .tools.elevated = (
              (.tools.elevated // {}) |
              object_or_empty
            ) |

            .tools.elevated.enabled = true |
            .tools.elevated.allowFrom = $elevatedAllowFrom |

            .tools.exec = (
              (.tools.exec // {}) |
              object_or_empty
            ) |

            .tools.exec.host = "gateway" |
            .tools.exec.security = "full" |
            .tools.exec.ask = "off" |

            .tools.fs = (
              (.tools.fs // {}) |
              object_or_empty
            ) |

            .tools.fs.workspaceOnly = false |

            del(.tools.allow) |
            del(.tools.deny) |

            .agents = (
              (.agents // {}) |
              object_or_empty
            ) |

            .agents.defaults = (
              (.agents.defaults // {}) |
              object_or_empty
            ) |

            .agents.defaults.sandbox = (
              (.agents.defaults.sandbox // {}) |
              object_or_empty
            ) |

            .agents.defaults.sandbox.mode = "off" |

            del(.agents.defaults.tools) |

            .agents.list = (
              if (.agents.list? | type) == "array" then
                .agents.list
              else
                []
              end
            ) |

            .agents.list = (
              if (.agents.list | length) == 0 then
                [
                  {
                    id: "main",
                    name: "main"
                  }
                ]
              else
                .agents.list
              end
            ) |

            .agents.list |= map(
              . = (
                if type == "object" then
                  .
                else
                  {}
                end
              ) |

              .id = (
                if (.id? | type) == "string" and .id != "" then
                  .id
                else
                  "main"
                end
              ) |

              .name = (
                if (.name? | type) == "string" and .name != "" then
                  .name
                else
                  .id
                end
              ) |

              .tools = (
                (.tools // {}) |
                object_or_empty
              ) |

              .tools.profile = "full" |

              .tools.elevated = (
                (.tools.elevated // {}) |
                object_or_empty
              ) |

              .tools.elevated.enabled = true |
              .tools.elevated.allowFrom = $elevatedAllowFrom |

              del(.tools.allow) |
              del(.tools.deny)
            ) |

            .mcp = (
              (.mcp // {}) |
              object_or_empty
            ) |

            .mcp.servers = (
              (.mcp.servers // {}) |
              object_or_empty
            ) |

            .mcp.servers.context7 = {
              command: "npx",
              args: [
                "-y",
                ("@upstash/context7-mcp@" + $context7Version)
              ]
            } |

            .mcp.servers.workspace = {
              command: "npx",
              args: [
                "-y",
                (
                  "@modelcontextprotocol/server-filesystem@" +
                  $filesystemVersion
                ),
                "/root/.openclaw/workspace"
              ]
            } |

            .mcp.servers.memory = {
              command: "npx",
              args: [
                "-y",
                (
                  "@modelcontextprotocol/server-memory@" +
                  $memoryVersion
                )
              ]
            }
            ' "$CONFIG_FILE" >"$TMP_FILE"

          jq -e \
            'type == "object"' \
            "$TMP_FILE" >/dev/null

          mv "$TMP_FILE" "$CONFIG_FILE"
          trap - EXIT

          chown -R \
            "$OPENCLAW_USER:$OPENCLAW_GROUP" \
            "$OPENCLAW_HOME/.openclaw"

          chmod 700 "$OPENCLAW_HOME/.openclaw"
          chmod 600 "$CONFIG_FILE"
          ENSURE_CONFIG

          chmod 755 /usr/local/sbin/openclaw-ensure-config

          cat >/usr/local/sbin/openclaw-sanitize-config <<'SANITIZE_CONFIG'
          #!/usr/bin/env bash
          set -Eeuo pipefail

          CONFIG="${1:-/root/.openclaw/openclaw.json}"

          if [ "$CONFIG" != "/root/.openclaw/openclaw.json" ]; then
            echo "错误：此模板只维护 /root/.openclaw/openclaw.json"
            exit 1
          fi

          exec /usr/local/sbin/openclaw-ensure-config
          SANITIZE_CONFIG

          chmod 755 /usr/local/sbin/openclaw-sanitize-config

          cat >/usr/local/sbin/openclaw-assert-max-permissions <<'ASSERT_PERMISSIONS'
          #!/usr/bin/env bash
          set -Eeuo pipefail

          CONFIG="/root/.openclaw/openclaw.json"

          ELEVATED_ALLOW_FROM='{
            "*": ["*"],
            "webchat": ["*"],
            "api": ["*"],
            "cli": ["*"],
            "dashboard": ["*"],
            "gateway": ["*"],
            "local": ["*"],
            "mcp": ["*"],
            "agent": ["*"],
            "agents": ["*"],
            "tool": ["*"],
            "tools": ["*"],
            "exec": ["*"],
            "direct": ["*"],
            "server": ["*"],
            "whatsapp": ["*"],
            "telegram": ["*"],
            "discord": ["*"],
            "slack": ["*"],
            "signal": ["*"],
            "imessage": ["*"],
            "matrix": ["*"],
            "msteams": ["*"],
            "googlechat": ["*"],
            "mattermost": ["*"],
            "line": ["*"]
          }'

          jq -e \
            --argjson elevatedAllowFrom "$ELEVATED_ALLOW_FROM" \
            '
            type == "object" and

            .tools.profile == "full" and
            .tools.elevated.enabled == true and
            .tools.elevated.allowFrom == $elevatedAllowFrom and

            .tools.exec.host == "gateway" and
            .tools.exec.security == "full" and
            .tools.exec.ask == "off" and

            .tools.fs.workspaceOnly == false and

            (.tools | has("allow") | not) and
            (.tools | has("deny") | not) and

            .agents.defaults.sandbox.mode == "off" and

            (
              (.agents.list | type) == "array" and
              (.agents.list | length) > 0
            ) and

            all(
              .agents.list[];
              .tools.profile == "full" and
              .tools.elevated.enabled == true and
              .tools.elevated.allowFrom == $elevatedAllowFrom and
              (.tools | has("allow") | not) and
              (.tools | has("deny") | not)
            )
            ' "$CONFIG" >/dev/null

          openclaw config validate

          echo "OpenClaw 最高权限配置校验通过"
          ASSERT_PERMISSIONS

          chmod 755 /usr/local/sbin/openclaw-assert-max-permissions

          echo "=================================================="
          echo "写入 API 配置脚本"
          echo "=================================================="

          cat >/usr/local/bin/openclaw-api-setup <<'API_SETUP'
          #!/usr/bin/env bash
          set -Eeuo pipefail
          umask 077

          CONFIG_FILE="/root/.openclaw/openclaw.json"
          TEMP_FILES=()

          cleanup() {
            local file

            for file in "${TEMP_FILES[@]}"; do
              rm -f -- "$file"
            done
          }

          trap cleanup EXIT

          trim() {
            printf '%s' "$1" |
              sed 's/^[[:space:]]*//;s/[[:space:]]*$//'
          }

          mask_secret() {
            local value="${1:-}"
            local length="${#value}"

            if [ "$length" -le 8 ]; then
              printf '********'
            else
              printf '%s****%s' \
                "${value:0:4}" \
                "${value: -4}"
            fi
          }

          normalize_base_url() {
            local value

            value="$(trim "$1")"
            value="${value%/}"

            case "$value" in
              */chat/completions)
                value="${value%/chat/completions}"
                ;;
            esac

            printf '%s' "${value%/}"
          }

          curl_config_escape() {
            printf '%s' "$1" |
              sed 's/\\/\\\\/g; s/"/\\"/g'
          }

          prune_backups() {
            local files=()
            local index

            mapfile -t files < <(
              find /root/.openclaw \
                -maxdepth 1 \
                -type f \
                -name 'openclaw.json.bak.*' \
                -printf '%T@ %p\n' |
                sort -rn |
                cut -d' ' -f2-
            )

            for ((index = 5; index < ${#files[@]}; index++)); do
              rm -f -- "${files[$index]}"
            done
          }

          wait_for_gateway() {
            local port="$1"
            local attempt

            for attempt in $(seq 1 30); do
              if systemctl is-active --quiet openclaw-gateway &&
                 ss -lntH |
                   awk '{print $4}' |
                   grep -Eq "(^|:|\\])${port}$"; then
                return 0
              fi

              sleep 1
            done

            return 1
          }

          restore_config() {
            local backup="$1"

            if [ -f "$backup" ]; then
              cp -a "$backup" "$CONFIG_FILE"
              chmod 600 "$CONFIG_FILE"
            fi

            systemctl restart openclaw-gateway 2>/dev/null || true
          }

          /usr/local/sbin/openclaw-ensure-config

          if ! jq -e \
            'type == "object"' \
            "$CONFIG_FILE" >/dev/null 2>&1; then
            echo "错误：OpenClaw 配置不是 JSON 对象"
            exit 1
          fi

          OLD_BASE_URL="$(
            jq -r '
              if (.models.providers.custom.baseUrl? | type) == "string"
              then
                .models.providers.custom.baseUrl
              else
                ""
              end
            ' "$CONFIG_FILE"
          )"

          OLD_MODEL="$(
            jq -r '
              if (.models.providers.custom.models? | type) == "array"
                 and (.models.providers.custom.models | length) > 0
                 and (
                   .models.providers.custom.models[0].id? |
                   type
                 ) == "string"
              then
                .models.providers.custom.models[0].id
              else
                ""
              end
            ' "$CONFIG_FILE"
          )"

          OLD_KEY="$(
            jq -r '
              if (.models.providers.custom.apiKey? | type) == "string"
              then
                .models.providers.custom.apiKey
              else
                ""
              end
            ' "$CONFIG_FILE"
          )"

          OLD_REASONING="$(
            jq -r '
              if (.models.providers.custom.models? | type) == "array"
                 and (.models.providers.custom.models | length) > 0
                 and (
                   .models.providers.custom.models[0].reasoning? |
                   type
                 ) == "boolean"
              then
                .models.providers.custom.models[0].reasoning
              else
                false
              end
            ' "$CONFIG_FILE"
          )"

          clear 2>/dev/null || true

          echo "============================================================"
          echo "OpenClaw OpenAI-Compatible API 配置"
          echo "============================================================"
          echo
          echo "示例："
          echo "  https://api.deepseek.com"
          echo "  https://api.moonshot.cn/v1"
          echo "  https://dashscope.aliyuncs.com/compatible-mode/v1"
          echo
          echo "也可以输入完整的 /chat/completions 地址。"
          echo "============================================================"
          echo

          read -r -p \
            "Base URL${OLD_BASE_URL:+ [$OLD_BASE_URL]}: " \
            BASE_URL

          BASE_URL="$(trim "${BASE_URL:-}")"

          if [ -z "$BASE_URL" ]; then
            BASE_URL="$OLD_BASE_URL"
          fi

          BASE_URL="$(normalize_base_url "$BASE_URL")"

          read -r -p \
            "模型名称${OLD_MODEL:+ [$OLD_MODEL]}: " \
            MODEL_ID

          MODEL_ID="$(trim "${MODEL_ID:-}")"

          if [ -z "$MODEL_ID" ]; then
            MODEL_ID="$OLD_MODEL"
          fi

          read -r -p \
            "是否支持 reasoning？[${OLD_REASONING:-false}] y/N: " \
            REASONING_INPUT

          REASONING_INPUT="$(trim "${REASONING_INPUT:-}")"

          if [ -z "$REASONING_INPUT" ]; then
            MODEL_REASONING="${OLD_REASONING:-false}"
          else
            case "$REASONING_INPUT" in
              y|Y|yes|YES|Yes|true|TRUE|1)
                MODEL_REASONING=true
                ;;
              n|N|no|NO|No|false|FALSE|0)
                MODEL_REASONING=false
                ;;
              *)
                echo "错误：reasoning 只能输入 y 或 n"
                exit 1
                ;;
            esac
          fi

          if [ -n "$OLD_KEY" ]; then
            echo "检测到已有 API Key：$(mask_secret "$OLD_KEY")"

            read -r -s -p \
              "输入新 API Key，直接回车保留旧 Key: " \
              API_KEY

            echo

            API_KEY="$(trim "${API_KEY:-}")"

            if [ -z "$API_KEY" ]; then
              API_KEY="$OLD_KEY"
            fi
          else
            read -r -s -p "API Key: " API_KEY
            echo

            API_KEY="$(trim "${API_KEY:-}")"
          fi

          if [ -z "$BASE_URL" ] ||
             [ -z "$MODEL_ID" ] ||
             [ -z "$API_KEY" ]; then
            echo "错误：Base URL、模型名称和 API Key 不能为空"
            exit 1
          fi

          case "$BASE_URL" in
            http://*|https://*)
              ;;
            *)
              echo "错误：Base URL 必须以 http:// 或 https:// 开头"
              exit 1
              ;;
          esac

          case "$API_KEY" in
            *$'\n'*|*$'\r'*)
              echo "错误：API Key 不能包含换行符"
              exit 1
              ;;
          esac

          CHAT_URL="$BASE_URL/chat/completions"

          TEST_BODY="$(
            jq -nc \
              --arg model "$MODEL_ID" \
              '{
                model: $model,
                messages: [
                  {
                    role: "user",
                    content: "请只回复 OK"
                  }
                ],
                max_tokens: 32,
                stream: false
              }'
          )"

          CURL_CONFIG="$(mktemp)"
          TEST_RESPONSE="$(mktemp)"
          TEST_ERROR="$(mktemp)"

          TEMP_FILES+=(
            "$CURL_CONFIG"
            "$TEST_RESPONSE"
            "$TEST_ERROR"
          )

          chmod 600 "$CURL_CONFIG"

          ESCAPED_API_KEY="$(
            curl_config_escape "$API_KEY"
          )"

          cat >"$CURL_CONFIG" <<CURL_CONFIGURATION
          header = "Authorization: Bearer $ESCAPED_API_KEY"
          CURL_CONFIGURATION

          echo
          echo "正在测试：$CHAT_URL"
          echo "模型：$MODEL_ID"
          echo "API Key：$(mask_secret "$API_KEY")"
          echo

          HTTP_CODE="$(
            curl \
              --silent \
              --show-error \
              --config "$CURL_CONFIG" \
              --connect-timeout 10 \
              --max-time 45 \
              --output "$TEST_RESPONSE" \
              --write-out '%{http_code}' \
              --header 'Content-Type: application/json' \
              --data "$TEST_BODY" \
              "$CHAT_URL" \
              2>"$TEST_ERROR" || true
          )"

          case "$HTTP_CODE" in
            200|201)
              echo "API 测试成功，HTTP $HTTP_CODE"
              ;;
            *)
              echo "API 测试失败，HTTP ${HTTP_CODE:-无}"

              if [ -s "$TEST_ERROR" ]; then
                echo
                echo "curl 错误："
                cat "$TEST_ERROR"
              fi

              if [ -s "$TEST_RESPONSE" ]; then
                echo
                echo "接口返回："
                cat "$TEST_RESPONSE"
                echo
              fi

              read -r -p \
                "测试失败，仍然保存配置吗？y/N: " \
                SAVE_ANYWAY

              case "${SAVE_ANYWAY:-N}" in
                y|Y|yes|YES|Yes|true|TRUE|1)
                  ;;
                *)
                  echo "已取消"
                  exit 1
                  ;;
              esac
              ;;
          esac

          BACKUP_SUFFIX="$(
            date -u +'%Y%m%d-%H%M%S'
          )"

          BACKUP_FILE="$CONFIG_FILE.bak.$BACKUP_SUFFIX"

          cp -a "$CONFIG_FILE" "$BACKUP_FILE"
          chmod 600 "$BACKUP_FILE"

          systemctl stop openclaw-gateway 2>/dev/null || true

          TMP_CONFIG="$(mktemp)"
          TEMP_FILES+=("$TMP_CONFIG")

          PRIMARY_MODEL="custom/$MODEL_ID"

          jq \
            --arg baseUrl "$BASE_URL" \
            --arg apiKey "$API_KEY" \
            --arg modelId "$MODEL_ID" \
            --arg primaryModel "$PRIMARY_MODEL" \
            --argjson reasoning "$MODEL_REASONING" \
            '
            def object_or_empty:
              if type == "object" then . else {} end;

            .models = (
              (.models // {}) |
              object_or_empty
            ) |

            .models.mode = "merge" |

            .models.providers = (
              (.models.providers // {}) |
              object_or_empty
            ) |

            .models.providers.custom = {
              baseUrl: $baseUrl,
              apiKey: $apiKey,
              auth: "api-key",
              api: "openai-completions",
              models: [
                {
                  id: $modelId,
                  name: $modelId,
                  input: ["text"],
                  reasoning: $reasoning
                }
              ]
            } |

            .agents = (
              (.agents // {}) |
              object_or_empty
            ) |

            .agents.defaults = (
              (.agents.defaults // {}) |
              object_or_empty
            ) |

            .agents.defaults.model = {
              primary: $primaryModel,
              fallbacks: []
            }
            ' "$CONFIG_FILE" >"$TMP_CONFIG"

          jq -e \
            'type == "object"' \
            "$TMP_CONFIG" >/dev/null

          mv "$TMP_CONFIG" "$CONFIG_FILE"
          chmod 600 "$CONFIG_FILE"

          if ! /usr/local/sbin/openclaw-ensure-config ||
             ! /usr/local/sbin/openclaw-assert-max-permissions; then
            echo "错误：新配置未通过校验，恢复旧配置"

            restore_config "$BACKUP_FILE"
            exit 1
          fi

          GATEWAY_PORT="$(
            jq -r '.gateway.port' "$CONFIG_FILE"
          )"

          systemctl daemon-reload

          if ! systemctl restart openclaw-gateway; then
            echo "错误：Gateway 重启失败，恢复旧配置"

            restore_config "$BACKUP_FILE"
            exit 1
          fi

          if ! wait_for_gateway "$GATEWAY_PORT"; then
            echo "错误：Gateway 未正常启动，恢复旧配置"

            journalctl \
              -u openclaw-gateway \
              -n 100 \
              --no-pager || true

            restore_config "$BACKUP_FILE"
            exit 1
          fi

          prune_backups

          echo
          echo "============================================================"
          echo "API 配置成功"
          echo "============================================================"
          echo "Base URL: $BASE_URL"
          echo "Chat URL: $CHAT_URL"
          echo "模型: $PRIMARY_MODEL"
          echo "Reasoning: $MODEL_REASONING"
          echo "API Key: $(mask_secret "$API_KEY")"
          echo "配置备份: $BACKUP_FILE"
          echo "============================================================"
          echo

          /usr/local/bin/openclaw-info || true
          API_SETUP

          chmod 755 /usr/local/bin/openclaw-api-setup

          echo "=================================================="
          echo "写入信息和维护命令"
          echo "=================================================="

          cat >/usr/local/sbin/openclaw-refresh-info <<'REFRESH_INFO'
          #!/usr/bin/env bash
          set -Eeuo pipefail
          umask 077

          [ -f /etc/openclaw-lxc.env ] &&
            . /etc/openclaw-lxc.env

          CONFIG_FILE="/root/.openclaw/openclaw.json"
          INFO_FILE="/root/openclaw-info.txt"

          INTERFACE="${OPENCLAW_NET_IFACE:-eth0}"
          PORT="${OPENCLAW_GATEWAY_PORT:-18789}"

          IPV4="$(
            ip -o -4 addr \
              show dev "$INTERFACE" \
              scope global \
              2>/dev/null |
              awk '{print $4}' |
              cut -d/ -f1 |
              head -n1 || true
          )"

          TOKEN=""

          if [ -s "$CONFIG_FILE" ] &&
             jq -e \
               'type == "object"' \
               "$CONFIG_FILE" >/dev/null 2>&1; then
            TOKEN="$(
              jq -r '
                if (.gateway.auth.token? | type) == "string"
                then
                  .gateway.auth.token
                else
                  ""
                end
              ' "$CONFIG_FILE"
            )"

            CONFIG_PORT="$(
              jq -r '
                if (.gateway.port? | type) == "number"
                then
                  .gateway.port
                else
                  ""
                end
              ' "$CONFIG_FILE"
            )"

            if [ -n "$CONFIG_PORT" ]; then
              PORT="$CONFIG_PORT"
            fi
          fi

          {
            echo "============================================================"
            echo "OpenClaw LXC Debian 12"
            echo "============================================================"

            if [ -n "$IPV4" ]; then
              echo "访问地址:"
              echo "  http://$IPV4:$PORT"
              echo "  ws://$IPV4:$PORT"
            else
              echo "访问地址:"
              echo "  未检测到 eth0 IPv4"
              echo "  请在 Proxmox VE 中配置网络"
            fi

            echo
            echo "Gateway Token:"
            echo "  ${TOKEN:-尚未生成}"
            echo
            echo "第一次使用:"
            echo "  1. 运行 openclaw-api-setup"
            echo "  2. 填写 Base URL、模型名称和 API Key"
            echo "  3. 浏览器打开上面的 HTTP 地址"
            echo "  4. 输入 Gateway Token"
            echo
            echo "最高权限模式:"
            echo "  Gateway 用户: root"
            echo "  Sandbox: off"
            echo "  tools.profile: full"
            echo "  tools.elevated.enabled: true"
            echo "  tools.exec.host: gateway"
            echo "  tools.exec.security: full"
            echo "  tools.exec.ask: off"
            echo "  tools.fs.workspaceOnly: false"
            echo "  tools.allow: 已删除"
            echo "  tools.deny: 已删除"
            echo
            echo "常用命令:"
            echo "  openclaw-api-setup"
            echo "  openclaw-info"
            echo "  openclaw-status"
            echo "  openclaw-logs"
            echo "  openclaw-restart"
            echo "  openclaw-plugins"
            echo "  openclaw-update"
            echo "  openclaw-repair-max-permissions"
            echo
            echo "工作目录:"
            echo "  /root/.openclaw/workspace"
            echo "============================================================"
          } >"$INFO_FILE"

          chmod 600 "$INFO_FILE"
          REFRESH_INFO

          chmod 755 /usr/local/sbin/openclaw-refresh-info

          cat >/usr/local/bin/openclaw-info <<'INFO_COMMAND'
          #!/usr/bin/env bash
          set -Eeuo pipefail

          /usr/local/sbin/openclaw-refresh-info
          cat /root/openclaw-info.txt
          INFO_COMMAND

          cat >/usr/local/bin/openclaw-status <<'STATUS_COMMAND'
          #!/usr/bin/env bash
          set -Eeuo pipefail

          echo "============================================================"
          echo "systemd 服务状态"
          echo "============================================================"

          systemctl status \
            openclaw-gateway \
            --no-pager || true

          echo
          echo "============================================================"
          echo "配置校验"
          echo "============================================================"

          /usr/local/sbin/openclaw-assert-max-permissions || true

          echo
          echo "============================================================"
          echo "端口监听"
          echo "============================================================"

          PORT="$(
            jq -r \
              '.gateway.port // 18789' \
              /root/.openclaw/openclaw.json \
              2>/dev/null || printf '18789'
          )"

          ss -lntp |
            grep -E ":${PORT}([[:space:]]|$)" || true

          echo
          echo "============================================================"
          echo "网络地址"
          echo "============================================================"

          ip -brief address show eth0 2>/dev/null || true

          IPV4="$(
            ip -o -4 addr \
              show dev eth0 \
              scope global \
              2>/dev/null |
              awk '{print $4}' |
              cut -d/ -f1 |
              head -n1 || true
          )"

          if [ -n "$IPV4" ]; then
            echo
            echo "http://$IPV4:$PORT/"

            curl -I \
              --max-time 5 \
              "http://$IPV4:$PORT/" || true
          else
            echo "未检测到 eth0 IPv4"
          fi

          echo
          echo "============================================================"
          echo "OpenClaw 内置状态"
          echo "============================================================"

          openclaw status || true
          openclaw gateway status || true
          STATUS_COMMAND

          cat >/usr/local/bin/openclaw-logs <<'LOGS_COMMAND'
          #!/usr/bin/env bash
          set -Eeuo pipefail

          exec journalctl -u openclaw-gateway -f
          LOGS_COMMAND

          cat >/usr/local/bin/openclaw-restart <<'RESTART_COMMAND'
          #!/usr/bin/env bash
          set -Eeuo pipefail

          /usr/local/sbin/openclaw-ensure-config
          /usr/local/sbin/openclaw-assert-max-permissions

          systemctl daemon-reload
          systemctl restart openclaw-gateway

          sleep 5

          /usr/local/bin/openclaw-info

          systemctl status \
            openclaw-gateway \
            --no-pager
          RESTART_COMMAND

          cat >/usr/local/bin/openclaw-plugins <<'PLUGINS_COMMAND'
          #!/usr/bin/env bash
