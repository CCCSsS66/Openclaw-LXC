          done

          echo "错误：Gateway 启动失败"

          journalctl \
            -u openclaw-gateway \
            -n 100 \
            --no-pager || true

          if [ -f "$BACKUP" ]; then
            echo "恢复旧配置：$BACKUP"

            cp -a "$BACKUP" "$CONFIG"
            chmod 600 "$CONFIG"

            systemctl restart openclaw-gateway 2>/dev/null || true
          fi

          exit 1
          REPAIR_COMMAND

          cat >/usr/local/bin/openclaw-update <<'UPDATE_COMMAND'
          #!/usr/bin/env bash
          set -Eeuo pipefail
          umask 077

          CONFIG="/root/.openclaw/openclaw.json"
          CONFIG_BACKUP="$CONFIG.update-bak.$(date -u +'%Y%m%d-%H%M%S')"

          OPENCLAW_PACKAGE_JSON="$(
            npm root -g
          )/openclaw/package.json"

          if [ ! -f "$OPENCLAW_PACKAGE_JSON" ]; then
            echo "错误：找不到 OpenClaw package.json"
            exit 1
          fi

          OLD_VERSION="$(
            jq -er '.version' "$OPENCLAW_PACKAGE_JSON"
          )"

          NEW_VERSION="$(
            npm view openclaw@latest version --json |
              jq -er '
                if type == "array" then
                  if length > 0 then .[-1] else empty end
                elif type == "string" then
                  .
                else
                  empty
                end
              '
          )"

          if ! printf '%s' "$NEW_VERSION" |
            grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([+-][A-Za-z0-9._-]+)?$'; then
            echo "错误：无法解析最新版本：$NEW_VERSION"
            exit 1
          fi

          echo "当前版本：$OLD_VERSION"
          echo "目标版本：$NEW_VERSION"

          cp -a "$CONFIG" "$CONFIG_BACKUP"
          chmod 600 "$CONFIG_BACKUP"

          rollback() {
            echo "正在回滚 OpenClaw：$OLD_VERSION"

            npm install -g "openclaw@$OLD_VERSION" || true

            cp -a "$CONFIG_BACKUP" "$CONFIG"
            chmod 600 "$CONFIG"

            systemctl daemon-reload
            systemctl restart openclaw-gateway 2>/dev/null || true
          }

          systemctl stop openclaw-gateway 2>/dev/null || true

          if ! npm install -g "openclaw@$NEW_VERSION"; then
            echo "错误：新版本安装失败"
            rollback
            exit 1
          fi

          if ! /usr/local/sbin/openclaw-ensure-config ||
             ! /usr/local/sbin/openclaw-assert-max-permissions; then
            echo "错误：新版本不兼容最高权限配置"
            rollback
            exit 1
          fi

          systemctl daemon-reload

          if ! systemctl restart openclaw-gateway; then
            echo "错误：新版本 Gateway 启动失败"
            rollback
            exit 1
          fi

          PORT="$(
            jq -r \
              '.gateway.port // 18789' \
              "$CONFIG"
          )"

          for attempt in $(seq 1 30); do
            if systemctl is-active --quiet openclaw-gateway &&
               ss -lntH |
                 awk '{print $4}' |
                 grep -Eq "(^|:|\\])${PORT}$"; then
              printf '%s\n' \
                "$NEW_VERSION" \
                >/etc/openclaw-version

              chmod 644 /etc/openclaw-version

              echo "OpenClaw 更新成功：$NEW_VERSION"
              openclaw --version
              exit 0
            fi

            sleep 1
          done

          echo "错误：新版本 Gateway 未正常监听"

