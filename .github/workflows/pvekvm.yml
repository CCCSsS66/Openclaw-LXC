  release:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          pattern: pve-*
          merge-multiple: true

      - name: Show release files
        shell: bash
        run: |
          set -euo pipefail
          find release -maxdepth 1 -type f -print | sort
          sha256sum release/*.qcow2

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          make_latest: true
          overwrite_files: true
          body: |
            PVE KVM CloudInit images.

            Strict network policy:
            - Cloud-init network rendering is disabled.
            - Built-in DHCP network profiles are removed.
            - DHCP from PVE Cloud-Init is ignored.
            - Only static IP configuration from PVE Cloud-Init is applied by pve-static-network.
            - IPv6 RA/SLAAC from router is disabled.
            - Router-assigned IPv6 is blocked.
            - If PVE does not provide a static IP, the VM should not automatically obtain IPv4 or IPv6 from router DHCP/RA.

            Supported distros:
            - debian
            - ubuntu
            - centos
            - almalinux
            - rockylinux
            - alpine
          files: release/*
