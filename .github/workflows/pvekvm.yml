name: Build PVE KVM CloudInit Images

on:
  workflow_dispatch:
    inputs:
      distros:
        description: "要构建的系统，逗号分隔：debian,ubuntu,centos,almalinux,rockylinux,alpine"
        required: false
        default: "debian,ubuntu,centos,almalinux,rockylinux,alpine"
      release_tag:
        description: "发布 tag，留空则自动生成 pve-cloudinit-${run_number}"
        required: false
        default: ""
  push:
    tags:
      - "v*"
      - "pve-*"

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.prepare.outputs.matrix }}
      release_tag: ${{ steps.prepare.outputs.release_tag }}
      release_name: ${{ steps.prepare.outputs.release_name }}
    steps:
      - name: Prepare matrix and release tag
        id: prepare
        shell: bash
        env:
          INPUT_DISTROS: ${{ github.event_name == 'workflow_dispatch' && inputs.distros || 'debian,ubuntu,centos,almalinux,rockylinux,alpine' }}
          INPUT_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || '' }}
        run: |
          set -euo pipefail

          allowed="debian ubuntu centos almalinux rockylinux alpine"
          raw="${INPUT_DISTROS:-debian,ubuntu,centos,almalinux,rockylinux,alpine}"

          matrix="$(
            RAW="$raw" ALLOWED="$allowed" python3 - <<'PY'
          import json
          import os
          import sys

          raw = os.environ["RAW"]
          allowed = os.environ["ALLOWED"].split()
          requested = []

          for item in raw.split(","):
              name = item.strip().lower()
              if not name:
                  continue
              if name not in allowed:
                  print(f"unsupported distro: {name}", file=sys.stderr)
                  sys.exit(1)
              if name not in requested:
                  requested.append(name)

          if not requested:
              print("no distro selected", file=sys.stderr)
              sys.exit(1)

          print(json.dumps({"include": [{"distro": name} for name in requested]}, separators=(",", ":")))
          PY
          )"

          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            release_tag="${GITHUB_REF_NAME}"
          elif [[ -n "${INPUT_RELEASE_TAG}" ]]; then
            release_tag="${INPUT_RELEASE_TAG}"
          else
            release_tag="pve-cloudinit-${GITHUB_RUN_NUMBER}"
          fi

          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=PVE KVM CloudInit Images ${release_tag}" >> "$GITHUB_OUTPUT"

          echo "Build matrix: ${matrix}"
          echo "Release tag: ${release_tag}"

  build:
    needs: prepare
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    env:
      DISTRO: ${{ matrix.distro }}
      OUTPUT_DIR: ${{ github.workspace }}/artifacts
      LIBGUESTFS_BACKEND: direct

    steps:
      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            curl \
            grep \
            libguestfs-tools \
            qemu-utils \
            xz-utils
          sudo chmod 666 /dev/kvm || true

      - name: Build ${{ matrix.distro }} image
        shell: bash
        run: |
          set -euo pipefail

          die() {
            printf 'ERROR: %s\n' "$*" >&2
            exit 1
          }

          command -v curl >/dev/null || die "curl not found"
          command -v qemu-img >/dev/null || die "qemu-img not found"
          command -v virt-customize >/dev/null || die "virt-customize not found"

          WORKDIR="${GITHUB_WORKSPACE}/work/${DISTRO}"
          OUTDIR="${OUTPUT_DIR}"
          mkdir -p "${WORKDIR}" "${OUTDIR}"

          resolve_latest_url() {
            local base_url="$1"
            local pattern="$2"
            local html
            local file

            html="$(curl -fsSL "${base_url}")"

            file="$(
              printf '%s\n' "${html}" \
                | grep -oE 'href="[^"]+"' \
                | cut -d'"' -f2 \
                | grep -E "${pattern}" \
                | grep -vE '\.(sha256|SHA256|checksum|CHECKSUM|sig|asc|txt)$' \
                | sort -V \
                | tail -n1
            )"

            [[ -n "${file}" ]] || die "cannot resolve image from ${base_url} with pattern ${pattern}"

            if [[ "${file}" =~ ^https?:// ]]; then
              printf '%s\n' "${file}"
            else
              printf '%s%s\n' "${base_url}" "${file}"
            fi
          }

          case "${DISTRO}" in
            debian)
              FAMILY="debian"
              BASE_URL="https://cloud.debian.org/images/cloud/bookworm/latest/"
              PATTERN='debian-12-genericcloud-amd64\.qcow2$'
              PKGS="cloud-init,qemu-guest-agent"
              OUTPUT_BASENAME="debian-12-bookworm-pve-cloudinit"
              ;;
            ubuntu)
              FAMILY="debian"
              BASE_URL="https://cloud-images.ubuntu.com/noble/current/"
              PATTERN='noble-server-cloudimg-amd64\.img$'
              PKGS="cloud-init,qemu-guest-agent"
              OUTPUT_BASENAME="ubuntu-24.04-noble-pve-cloudinit"
              ;;
            centos)
              FAMILY="rhel"
              BASE_URL="https://cloud.centos.org/centos/9-stream/x86_64/images/"
              PATTERN='CentOS-Stream-GenericCloud-9-latest\.x86_64\.qcow2$'
              PKGS="cloud-init,qemu-guest-agent"
              OUTPUT_BASENAME="centos-stream-9-pve-cloudinit"
              ;;
            almalinux)
              FAMILY="rhel"
              BASE_URL="https://repo.almalinux.org/almalinux/9/cloud/x86_64/images/"
              PATTERN='AlmaLinux-9.*x86_64\.qcow2$'
              PKGS="cloud-init,qemu-guest-agent"
              OUTPUT_BASENAME="almalinux-9-pve-cloudinit"
              ;;
            rockylinux)
              FAMILY="rhel"
              BASE_URL="https://download.rockylinux.org/pub/rocky/9/images/x86_64/"
              PATTERN='Rocky-9.*x86_64\.qcow2$'
              PKGS="cloud-init,qemu-guest-agent"
              OUTPUT_BASENAME="rockylinux-9-pve-cloudinit"
              ;;
            alpine)
              FAMILY="alpine"
              BASE_URL="https://dl-cdn.alpinelinux.org/alpine/latest-stable/releases/cloud/"
              PATTERN='alpine-.*-x86_64-bios-cloudinit-r[0-9]+\.qcow2(\.xz)?$'
              PKGS="cloud-init,qemu-guest-agent,openssh"
              OUTPUT_BASENAME="alpine-latest-stable-pve-cloudinit"
              ;;
            *)
              die "unsupported distro: ${DISTRO}"
              ;;
          esac

          IMAGE_URL="$(resolve_latest_url "${BASE_URL}" "${PATTERN}")"
          SOURCE_NAME="$(basename "${IMAGE_URL%%\?*}")"
          SOURCE_IMAGE="${WORKDIR}/${SOURCE_NAME}"

          echo "[${DISTRO}] download: ${IMAGE_URL}"
          curl -fL --retry 5 --retry-delay 3 -o "${SOURCE_IMAGE}" "${IMAGE_URL}"

          if [[ "${SOURCE_IMAGE}" == *.xz ]]; then
            echo "[${DISTRO}] decompress xz"
            unxz -f "${SOURCE_IMAGE}"
            SOURCE_IMAGE="${SOURCE_IMAGE%.xz}"
          fi

          CLOUD_CFG="${WORKDIR}/99-pve-cloudinit-no-fallback-network.cfg"
          SYSCTL_CFG="${WORKDIR}/99-pve-disable-router-ipv6.conf"
          NM_CFG="${WORKDIR}/99-pve-no-auto-default.conf"

          cat > "${CLOUD_CFG}" <<'EOF'
          datasource_list: [ "NoCloud", "None" ]
          disable_fallback_netcfg: true
          EOF

          cat > "${SYSCTL_CFG}" <<'EOF'
          net.ipv6.conf.all.accept_ra = 0
          net.ipv6.conf.default.accept_ra = 0
          net.ipv6.conf.all.autoconf = 0
          net.ipv6.conf.default.autoconf = 0
          net.ipv6.conf.all.accept_redirects = 0
          net.ipv6.conf.default.accept_redirects = 0
          net.ipv4.conf.all.accept_redirects = 0
          net.ipv4.conf.default.accept_redirects = 0
          EOF

          cat > "${NM_CFG}" <<'EOF'
          [main]
          no-auto-default=*
          EOF

          COMMON_ARGS=(
            --network
            -a "${SOURCE_IMAGE}"
            --mkdir /etc/cloud/cloud.cfg.d
            --mkdir /etc/sysctl.d
            --upload "${CLOUD_CFG}:/etc/cloud/cloud.cfg.d/99-pve-cloudinit-no-fallback-network.cfg"
            --upload "${SYSCTL_CFG}:/etc/sysctl.d/99-pve-disable-router-ipv6.conf"
            --install "${PKGS}"
            --run-command 'cloud-init clean --logs || true'
            --run-command 'rm -rf /var/lib/cloud/* || true'
            --run-command 'rm -f /etc/ssh/ssh_host_* || true'
            --run-command 'truncate -s 0 /etc/machine-id || true'
            --run-command 'rm -f /var/lib/dbus/machine-id || true'
          )

          if [[ "${FAMILY}" == "debian" ]]; then
            EXTRA_ARGS=(
              --run-command 'rm -f /etc/netplan/*.yaml || true'
              --run-command 'rm -f /etc/network/interfaces.d/* || true'
              --run-command 'mkdir -p /etc/network/interfaces.d || true'
              --run-command 'printf "%s\n" "auto lo" "iface lo inet loopback" "source /etc/network/interfaces.d/*" > /etc/network/interfaces || true'
              --run-command 'rm -f /etc/systemd/network/*.network || true'
              --run-command 'systemctl enable qemu-guest-agent || true'
            )
          elif [[ "${FAMILY}" == "rhel" ]]; then
            EXTRA_ARGS=(
              --mkdir /etc/NetworkManager/conf.d
              --upload "${NM_CFG}:/etc/NetworkManager/conf.d/99-pve-no-auto-default.conf"
              --run-command 'rm -f /etc/NetworkManager/system-connections/*.nmconnection || true'
              --run-command 'rm -f /etc/sysconfig/network-scripts/ifcfg-eth* || true'
              --run-command 'rm -f /etc/sysconfig/network-scripts/ifcfg-ens* || true'
              --run-command 'rm -f /etc/sysconfig/network-scripts/ifcfg-enp* || true'
              --run-command 'rm -f /etc/sysconfig/network-scripts/ifcfg-enx* || true'
              --run-command 'systemctl enable NetworkManager || true'
              --run-command 'systemctl enable qemu-guest-agent || true'
            )
          elif [[ "${FAMILY}" == "alpine" ]]; then
            EXTRA_ARGS=(
              --run-command 'rm -f /etc/network/interfaces.d/* || true'
              --run-command 'mkdir -p /etc/network/interfaces.d || true'
              --run-command 'printf "%s\n" "auto lo" "iface lo inet loopback" "source /etc/network/interfaces.d/*" > /etc/network/interfaces || true'
              --run-command 'rc-update add cloud-init-local default || true'
              --run-command 'rc-update add cloud-init default || true'
              --run-command 'rc-update add cloud-config default || true'
              --run-command 'rc-update add cloud-final default || true'
              --run-command 'rc-update add qemu-guest-agent default || true'
              --run-command 'rc-update add qemu-ga default || true'
            )
          else
            die "unknown family: ${FAMILY}"
          fi

          echo "[${DISTRO}] customize image"
          virt-customize "${COMMON_ARGS[@]}" "${EXTRA_ARGS[@]}"

          FINAL_IMAGE="${OUTDIR}/${OUTPUT_BASENAME}.qcow2"

          echo "[${DISTRO}] convert compressed qcow2"
          qemu-img convert -p -O qcow2 -c "${SOURCE_IMAGE}" "${FINAL_IMAGE}"

          qemu-img info "${FINAL_IMAGE}" > "${FINAL_IMAGE}.info.txt"
          sha256sum "${FINAL_IMAGE}" > "${FINAL_IMAGE}.sha256"

          echo "[${DISTRO}] done"
          ls -lh "${FINAL_IMAGE}" "${FINAL_IMAGE}.sha256" "${FINAL_IMAGE}.info.txt"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pve-${{ matrix.distro }}
          path: artifacts/*
          if-no-files-found: error

  release:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          pattern: pve-*
          merge-multiple: true

      - name: Show release files
        shell: bash
        run: |
          set -euo pipefail
          find release -type f -maxdepth 1 -print | sort
          sha256sum release/*.qcow2

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          make_latest: true
          overwrite_files: true
          body: |
            PVE KVM CloudInit images.

            Network policy:
            - Cloud-init fallback network is disabled.
            - Built-in DHCP network profiles are removed.
            - NetworkManager automatic default connection is disabled where applicable.
            - IPv6 RA/SLAAC is disabled by sysctl.
            - VM networking should be configured explicitly from PVE Cloud-Init, for example ipconfig0/ip6/gw/gw6.

            Supported distros:
            - debian
            - ubuntu
            - centos
            - almalinux
            - rockylinux
            - alpine
          files: release/*
